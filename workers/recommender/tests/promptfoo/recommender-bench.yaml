defaultTest:
  options:
    # Strip <think>...</think> wrappers and code fences before assertions evaluate.
    transform: '(output=>{const s=typeof output==="string"?output:output?.content??JSON.stringify(output);return s.replace(/<think>[\s\S]*?<\/think>/g,"").replace(/^```(?:json)?\s*/m,"").replace(/\s*```\s*$/m,"").trim()})(output)'
  assert:
    # Tier 1 — Structural integrity (weight 3): page is fundamentally renderable
    - type: javascript
      description: "output has at least 2 === separators (3+ blocks)"
      value: '(output.match(/===/g) || []).length >= 2'
      weight: 3

    - type: javascript
      description: "first block is a hero"
      value: '(() => { try { return JSON.parse(output.split("===")[0].trim()).block === "hero"; } catch(e) { return false; } })()'
      weight: 3

    - type: javascript
      description: "hero block contains an image token"
      value: '(() => { const first = output.split("===")[0]; return first.includes("product-image:") || first.includes("hero-image:"); })()'
      weight: 3

    - type: javascript
      description: "suggestions present at the end"
      value: 'output.includes("\"suggestions\"")'
      weight: 3

    # Tier 2 — Rule compliance (weight 2): model follows prompt instructions
    - type: javascript
      description: "no forbidden buy suggestion type"
      value: '!/"type"\s*:\s*"buy"/.test(output)'
      weight: 2

    - type: javascript
      description: "suggestion types are only explore or compare"
      value: '(() => { const sugg = output.match(/"suggestions"\s*:\s*(\[[\s\S]*?\])/); if (!sugg) return true; const types = (sugg[1].match(/"type"\s*:\s*"([^"]+)"/g) || []).map(t => t.match(/"type"\s*:\s*"([^"]+)"/)[1]); return types.every(t => t === "explore" || t === "compare"); })()'
      weight: 2

    - type: javascript
      description: "all product hrefs use real catalog paths (no invented URLs)"
      value: '(() => { const hrefs = (output.match(/"href"\s*:\s*"([^"]+)"/g) || []).map(h => h.match(/"href"\s*:\s*"([^"]+)"/)[1]); return hrefs.every(h => h.startsWith("/products/") || h.startsWith("/experiences/") || h.startsWith("/stories/")); })()'
      weight: 2

    # Tier 3 — Visual variety (weight 1)
    - type: javascript
      description: "at least 2 different block types used"
      value: '(() => { try { const blocks = output.split("===").slice(0,-1).map(s => JSON.parse(s.trim()).block); return new Set(blocks).size >= 2; } catch(e) { return false; } })()'
      weight: 1

tests:
  - description: "cold-start: new visitor, no history"
    threshold: 0.7
    vars:
      query: "show me all your espresso machines"
      intent: { type: product-discovery }
      behavior: { coldStart: true }
      rag: {}
      followUp: null
    assert:
      - type: javascript
        description: "cold start uses hero-image:main"
        value: "output.split('===')[0].includes('hero-image:main')"
        weight: 2

  - description: "beginner: switching from Nespresso"
    threshold: 0.7
    vars:
      query: "switching from Nespresso, what Arco machine should I get?"
      intent: { type: beginner }
      behavior: { coldStart: true }
      rag:
        products:
          - { name: Primo, id: primo, price: 899, bestFor: [home-barista, beginner, espresso] }
          - { name: Nano, id: nano, price: 649, bestFor: [beginner, travel, espresso] }
          - { name: Automatico, id: automatico, price: 1899, bestFor: [beginner, office, milk-drinks] }
    assert:
      - type: javascript
        description: "recommends a beginner-friendly machine"
        value: "/(primo|nano|automatico)/i.test(output)"
        weight: 2

  - description: "comparison: primo vs doppio"
    threshold: 0.7
    vars:
      query: "primo vs doppio which is better for a home barista?"
      intent: { type: comparison }
      behavior: { coldStart: true }
      rag:
        products:
          - { name: Primo, id: primo, price: 899, bestFor: [home-barista, espresso, beginner] }
          - { name: Doppio, id: doppio, price: 1599, bestFor: [home-barista, milk-drinks, espresso] }
    assert:
      - type: javascript
        description: "comparison-table block present"
        value: 'output.includes("\"block\":\"comparison-table\"") || output.includes("\"block\": \"comparison-table\"")'
        weight: 3
      - type: javascript
        description: "mentions both primo and doppio"
        value: "/primo/i.test(output) && /doppio/i.test(output)"
        weight: 2

  - description: "feature-match: touchscreen"
    threshold: 0.7
    vars:
      query: "do you have any machines with a touchscreen?"
      intent: { type: espresso }
      behavior: { coldStart: false, viewedProducts: [] }
      rag:
        products:
          - { name: Automatico, id: automatico, price: 1899, bestFor: [beginner, office, milk-drinks] }
          - { name: Studio Pro, id: studio-pro, price: 3499, bestFor: [home-barista, espresso, upgrade] }
    assert:
      - type: javascript
        description: "leads with a touchscreen machine"
        value: "/(automatico|studio.?pro)/i.test(output.split('===')[0])"
        weight: 2

  - description: "follow-up: cheaper alternative"
    threshold: 0.7
    vars:
      query: "anything cheaper than the doppio?"
      intent: { type: budget }
      behavior: { coldStart: false, priceTier: mid, viewedProducts: [doppio] }
      followUp: { type: cheaper_alternative, label: "Show me cheaper options", product: Doppio }
      rag:
        products:
          - { name: Primo, id: primo, price: 899, bestFor: [home-barista, beginner, espresso] }
          - { name: Nano, id: nano, price: 649, bestFor: [beginner, travel, espresso] }
    assert:
      - type: javascript
        description: "recommends a cheaper machine (primo or nano)"
        value: "/(primo|nano)/i.test(output)"
        weight: 2

  - description: "follow-up: pivot to doppio"
    threshold: 0.7
    vars:
      query: "tell me more about the doppio"
      intent: { type: product-detail }
      behavior: { coldStart: false, viewedProducts: [primo, doppio] }
      followUp: { type: pivot, label: "Tell me more about Doppio", product: Doppio }
      rag:
        products:
          - { name: Doppio, id: doppio, price: 1599, bestFor: [home-barista, milk-drinks, espresso] }
    assert:
      - type: javascript
        description: "focuses on doppio"
        value: "/doppio/i.test(output)"
        weight: 2
